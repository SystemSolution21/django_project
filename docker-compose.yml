services:
  web:
    build: .
    image: django_mysite_image:v0.1.0
    # Wait for DB, run migrations, then start Gunicorn
    command: sh -c "python manage.py migrate && gunicorn mysite.wsgi:application -c gunicorn.conf.py"
    volumes:
      - ./media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - SQL_HOST=db
      - SQL_PORT=5432
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${SQL_DATABASE:-django_mysite_db}
      - POSTGRES_USER=${SQL_USER:-django_mysite_user}
      - POSTGRES_PASSWORD=${SQL_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SQL_USER:-django_mysite_user} -d ${SQL_DATABASE:-django_mysite_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
